html/head_include="<!--
	Yandex Games SDK: подключение + JS-мост для Godot (Этап 4).

	Этот файл вставляется в <head> веб-сборки через настройку экспорта
	html/head_include (см. web/README.md). Он:
	  1) подключает sdk.js площадки;
	  2) сразу после загрузки вызывает YaGames.init() и сташит ysdk + player;
	  3) заводит window.GodotYSDK — набор функций, которые дёргает
	     autoload/yandex_sdk.gd через JavaScriptBridge.

	Контракт с GDScript-обёрткой:
	  - window.GodotYSDK.ready / .failed — флаги готовности init (опрашиваются);
	  - асинхронные методы принимают godot-колбэк последним аргументом и
	    возвращают в него ОДНУ строку JSON (объекты через мост не ходят).

	Тестирование без модерации — dev-режим:
	  npx @yandex-games/sdk-dev-proxy -p <папка_билда> --app-id=<id>
	Прокси сам отдаёт /sdk.js (замоканный SDK: реклама-плейсхолдеры, сейвы в
	localStorage, симуляция авторизации/лидербордов).
-->
<script src=\"/sdk.js\"></script>
<script>
(function () {
	\"use strict\";

	// Объект-контракт с GDScript. Создаётся СИНХРОННО, чтобы обёртка нашла его
	// в _ready сразу (даже пока YaGames.init() ещё резолвится).
	var G = {
		ready: false,   // ysdk готов к работе
		failed: false,  // init упал ИЛИ мы не в среде Яндекса (запуск без прокси)
		ysdk: null,
		player: null,
		lang: \"ru\"
	};
	window.GodotYSDK = G;

	function boot() {
		if (typeof YaGames === \"undefined\") {
			// sdk.js не подключился — игра открыта вне Яндекса/без dev-proxy.
			G.failed = true;
			return;
		}
		YaGames.init().then(function (sdk) {
			G.ysdk = sdk;
			try { G.lang = (sdk.environment.i18n.lang) || \"ru\"; } catch (e) {}
			// Игрок — опционально и БЕЗ запроса разрешений (scopes:false): не
			// показываем окно авторизации на старте, лайт-режим тоже пишет данные.
			sdk.getPlayer({ scopes: false }).then(function (p) {
				G.player = p;
			}).catch(function () {
				G.player = null;
			}).finally(function () {
				G.ready = true;   // готовы, даже если игрок не поднялся
			});
		}).catch(function () {
			G.failed = true;
		});
	}

	// sdk.js помечен как обычный скрипт — к моменту выполнения этого блока он уже
	// исполнен (порядок тегов). Но подстрахуемся на случай отложенной загрузки.
	if (typeof YaGames !== \"undefined\") boot();
	else window.addEventListener(\"load\", boot);

	// -------------------- Хелперы, вызываемые из GDScript --------------------
	// Каждый асинхронный хелпер зовёт cb(JSON-строка) ровно один раз (кроме
	// showRewarded — там несколько событий, см. ниже).

	// Облачные сейвы: весь блоб игры одним объектом (лимит 200 КБ).
	G.loadData = function (cb) {
		if (!G.player) { cb(JSON.stringify({ ok: false, data: {} })); return; }
		G.player.getData().then(function (d) {
			cb(JSON.stringify({ ok: true, data: d || {} }));
		}).catch(function () {
			cb(JSON.stringify({ ok: false, data: {} }));
		});
	};

	G.saveData = function (json, cb) {
		if (!G.player) { cb(JSON.stringify({ ok: false })); return; }
		var obj;
		try { obj = JSON.parse(json); }
		catch (e) { cb(JSON.stringify({ ok: false })); return; }
		// flush:true — писать сразу (у нас нечастые точки сохранения).
		G.player.setData(obj, true).then(function () {
			cb(JSON.stringify({ ok: true }));
		}).catch(function () {
			cb(JSON.stringify({ ok: false }));
		});
	};

	// Полноэкранная реклама. onClose(wasShown) — конец показа/ошибки/троттлинга.
	G.showFullscreen = function (cb) {
		if (!G.ysdk) { cb(JSON.stringify({ shown: false })); return; }
		G.ysdk.adv.showFullscreenAdv({ callbacks: {
			onClose: function (wasShown) { cb(JSON.stringify({ shown: !!wasShown })); },
			onError: function () { cb(JSON.stringify({ shown: false })); }
		}});
	};

	// Rewarded-реклама. Шлём \"rewarded\" при засчитанном просмотре и \"close\"/\"error\"
	// при завершении — обёртка сама решает про награду и продолжение потока.
	G.showRewarded = function (cb) {
		if (!G.ysdk) { cb(JSON.stringify({ event: \"close\", rewarded: false })); return; }
		var got = false;
		G.ysdk.adv.showRewardedVideo({ callbacks: {
			onRewarded: function () { got = true; cb(JSON.stringify({ event: \"rewarded\" })); },
			onClose: function () { cb(JSON.stringify({ event: \"close\", rewarded: got })); },
			onError: function () { cb(JSON.stringify({ event: \"error\", rewarded: got })); }
		}});
	};

	// Лидерборды (актуальный API ysdk.leaderboards.*).
	G.lbSetScore = function (name, score, cb) {
		if (!G.ysdk || !G.ysdk.leaderboards) { cb(JSON.stringify({ ok: false })); return; }
		G.ysdk.leaderboards.setScore(name, score).then(function () {
			cb(JSON.stringify({ ok: true }));
		}).catch(function () {
			cb(JSON.stringify({ ok: false }));
		});
	};

	G.lbGetEntries = function (name, cb) {
		if (!G.ysdk || !G.ysdk.leaderboards) { cb(JSON.stringify({ ok: false, entries: [] })); return; }
		G.ysdk.leaderboards.getEntries(name, {
			quantityTop: 10, includeUser: true, quantityAround: 5
		}).then(function (res) {
			var raw = (res && res.entries) || [];
			var out = raw.map(function (e) {
				return {
					rank: e.rank,
					score: e.score,
					name: (e.player && e.player.publicName) || \"Аноним\"
				};
			});
			cb(JSON.stringify({ ok: true, entries: out }));
		}).catch(function () {
			cb(JSON.stringify({ ok: false, entries: [] }));
		});
	};

	// LoadingAPI / GameplayAPI — «?.» на случай, если фича недоступна.
	G.ready_ = function () {
		try { if (G.ysdk && G.ysdk.features && G.ysdk.features.LoadingAPI)
			G.ysdk.features.LoadingAPI.ready(); } catch (e) {}
	};
	G.gameplayStart = function () {
		try { if (G.ysdk && G.ysdk.features && G.ysdk.features.GameplayAPI)
			G.ysdk.features.GameplayAPI.start(); } catch (e) {}
	};
	G.gameplayStop = function () {
		try { if (G.ysdk && G.ysdk.features && G.ysdk.features.GameplayAPI)
			G.ysdk.features.GameplayAPI.stop(); } catch (e) {}
	};
})();
</script>
"
